name: Update Local Activity Heatmap

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Clone localcommit repo
        run: git clone https://github.com/kluless13/localcommit.git /tmp/localcommit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate heatmap SVG
        run: python3 scripts/generate_heatmap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add local-activity.svg
          git diff --staged --quiet || git commit -m "chore: update local activity heatmap"
          git push
